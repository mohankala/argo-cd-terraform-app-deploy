---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-private
  namespace: argo-cd
  #finalizers:
   # - resources-finalizer.argocd.agroproj.io
spec:
  project: default
  source: 
    repoURL: git@github.com:mohankala/argo-cd-private.git
    targetRevision:  HEAD
    path: my-app
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foregroound
      - PruneLast=true